<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <style>
        form { display: flex; flex-direction: column; max-width: 300px; gap: 10px; margin-bottom: 30px; }
    </style>
</head>
<body>
    <h1>Panel Administrador</h1>
    
    <form id="formProducto">
        <input type="password" id="password" placeholder="Contraseña Secreta" required>
        <select id="action">
            <option value="add">Agregar Nuevo</option>
            <option value="edit">Modificar Existente (por ID)</option>
        </select>
        <input type="text" id="id" placeholder="ID del Producto (Ej: 101)" required>
        <input type="text" id="nombre" placeholder="Nombre del Producto" required>
        <input type="number" id="precio" placeholder="Precio" required>
        <input type="text" id="imagen" placeholder="URL de la Foto" required>
        <button type="submit">Guardar Cambios</button>
    </form>

    <p id="mensaje"></p>

    <script>
        const URL_API = "TU_URL_DE_APPS_SCRIPT";

        document.getElementById("formProducto").addEventListener("submit", function(e) {
            e.preventDefault();
            document.getElementById("mensaje").innerText = "Procesando...";

            const formData = new URLSearchParams();
            formData.append("password", document.getElementById("password").value);
            formData.append("action", document.getElementById("action").value);
            formData.append("id", document.getElementById("id").value);
            formData.append("nombre", document.getElementById("nombre").value);
            formData.append("precio", document.getElementById("precio").value);
            formData.append("imagen", document.getElementById("imagen").value);

            fetch(URL_API, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: formData
            })
            .then(() => {
                document.getElementById("mensaje").innerText = "Acción enviada. Revisa tu catálogo en unos segundos.";
                document.getElementById("formProducto").reset();
            })
            .catch(err => document.getElementById("mensaje").innerText = "Error de conexión.");
        });
    </script>
</body>
</html>
