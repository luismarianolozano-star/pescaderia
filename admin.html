<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Pescadería</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f7f6; margin: 0; }
        .contenedor-login { max-width: 350px; margin: 100px auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .contenedor-admin { max-width: 800px; margin: 0 auto; display: none; }
        form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .full-width { grid-column: span 2; }
        input, select, button, .btn-nav { padding: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #0d6efd; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0b5ed7; }
        .acciones-top { display: flex; gap: 10px; float: right; }
        .btn-logout { background-color: #dc3545; color: white; padding: 6px 12px; font-size: 12px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-ver-catalogo { background-color: #198754; color: white; padding: 6px 12px; font-size: 12px; text-decoration: none; border-radius: 4px; font-weight: bold; display: inline-block; }
        .lista-admin { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); clear: both; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #ddd; }
        th { background-color: #e9ecef; }
        .btn-edit { background-color: #ffc107; color: black; padding: 4px 8px; font-size: 12px; border: none; border-radius: 3px; cursor: pointer; }
        .img-tabla { width: 50px; height: 40px; object-fit: contain; background: #eee; border-radius: 4px; }
    </style>
</head>
<body>

    <!-- PANTALLA DE INGRESO PROTEGIDA -->
    <div id="seccion-login" class="contenedor-login">
        <h2>🔒 Panel Privado</h2>
        <p>Introduce la contraseña de administración:</p>
        <input type="password" id="pass-inicial" placeholder="Contraseña Secreta" style="width: 90%; margin-bottom: 15px;"><br>
        <button onclick="verificarAcceso()" style="width: 96%;">Ingresar al Panel</button>
    </div>

    <!-- PANEL DE ADMINISTRACIÓN PRINCIPAL -->
    <div id="seccion-admin" class="contenedor-admin">
        <div class="acciones-top">
            <a href="index.html" class="btn-ver-catalogo">📄 Ver Catálogo</a>
            <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
        
        <h1>🛠️ Administrador de Pescadería</h1>
        
        <form id="formProducto">
            <div>
                <label>Acción a realizar:</label><br>
                <select id="action" style="width: 100%; margin-top: 5px;">
                    <option value="add">Agregar Nuevo Producto</option>
                    <option value="edit">Modificar Existente (por ID)</option>
                </select>
            </div>
            <div>
                <label>ID del Producto:</label><br>
                <input type="text" id="id" placeholder="Ej: 101" required style="width: 100%; margin-top: 5px;">
            </div>
            <div class="full-width">
                <label>Nombre del Producto:</label><br>
                <input type="text" id="nombre" placeholder="Ej: Filet de Merluza" required style="width: 100%; margin-top: 5px;">
            </div>
            <div>
                <label>Precio ($):</label><br>
                <input type="number" id="precio" placeholder="Ej: 4500" required style="width: 100%; margin-top: 5px;">
            </div>
            <div>
                <label>Enlace de la Foto (URL):</label><br>
                <input type="text" id="imagen" placeholder="https://..." required style="width: 100%; margin-top: 5px;">
            </div>
            <button type="submit" class="full-width">Guardar Cambios en Base de Datos</button>
        </form>

        <p id="mensaje" style="font-weight: bold; color: #0d6efd;"></p>

        <!-- TABLA DE CONTROL PARA EL ADMIN -->
        <div class="lista-admin">
            <h3>Productos en Sistema</h3>
            <table>
                <thead>
                    <tr>
                        <th>Foto</th>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-cuerpo">
                    <!-- Datos dinámicos -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycbz9hJVU8DDRiyJL9tCe-Or6vRx_u5RIq1FQpggpgl4bIihENEVQ3mi-LcmucDD-n2xj/exec";
        let claveSecreta = "Luis123";

        function verificarAcceso() {
            const pass = document.getElementById("pass-inicial").value;
            if (!pass) return alert("Escribe la contraseña");
            claveSecreta = pass;
            document.getElementById("seccion-login").style.display = "none";
            document.getElementById("seccion-admin").style.display = "block";
            obtenerProductosAdmin();
        }

        function cerrarSesion() {
            claveSecreta = "";
            document.getElementById("pass-inicial").value = "";
            document.getElementById("seccion-login").style.display = "block";
            document.getElementById("seccion-admin").style.display = "none";
        }

        document.getElementById("formProducto").addEventListener("submit", function(e) {
            e.preventDefault();
            document.getElementById("mensaje").innerText = "Guardando en Google Sheets...";

            const formData = new URLSearchParams();
            formData.append("password", claveSecreta);
            formData.append("action", document.getElementById("action").value);
            formData.append("id", document.getElementById("id").value);
            formData.append("nombre", document.getElementById("nombre").value);
            formData.append("precio", document.getElementById("precio").value);
            formData.append("imagen", document.getElementById("imagen").value);

            fetch(URL_API, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: formData
            })
            .then(() => {
                document.getElementById("mensaje").innerText = "¡Cambio exitoso! La lista se actualizará en breve.";
                document.getElementById("formProducto").reset();
                setTimeout(obtenerProductosAdmin, 3000);
            })
            .catch(err => document.getElementById("mensaje").innerText = "Error al conectar.");
        });

        function obtenerProductosAdmin() {
            const tabla = document.getElementById("tabla-cuerpo");
            tabla.innerHTML = "<tr><td colspan='5'>Cargando base de datos...</td></tr>";

            fetch(URL_API)
            .then(res => res.json())
            .then(productos => {
                tabla.innerHTML = "";
                if (!productos || productos.length === 0) {
                    tabla.innerHTML = "<tr><td colspan='5'>No hay productos registrados.</td></tr>";
                    return;
                }
                productos.forEach(prod => {
                    let urlImg = prod.imagen || prod.Imagen || prod.foto || "";
                    const foto = urlImg ? urlImg : "data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='50' height='40'><rect width='50' height='40' fill='%23eee'/></svg>";
                    
                    const nombreSeguro = (prod.nombre || '').replace(/'/g, "\\'");
                    const imgSegura = urlImg.replace(/'/g, "\\'");

                    tabla.innerHTML += `
                        <tr>
                            <td><img src="${foto}" class="img-tabla"></td>
                            <td><strong>${prod.id || 'N/A'}</strong></td>
                            <td>${prod.nombre || 'Sin nombre'}</td>
                            <td>$${prod.precio || 0}</td>
                            <td>
                                <button class="btn-edit" onclick="prepararFormulario('${prod.id}', '${nombreSeguro}', '${prod.precio}', '${imgSegura}')">Editar</button>
                            </td>
                        </tr>
                    `;
                });
            })
            .catch(err => {
                tabla.innerHTML = "<tr><td colspan='5'>Error de lectura.</td></tr>";
            });
        }

        window.prepararFormulario = function(id, nombre, precio, imagen) {
            document.getElementById("action").value = "edit";
            document.getElementById("id").value = id;
            document.getElementById("nombre").value = nombre;
            document.getElementById("precio").value = precio;
            document.getElementById("imagen").value = imagen;
            document.getElementById("mensaje").innerText = "Modo edición activado para el ID: " + id;
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
