<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pescadería - Catálogo de Productos</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f0f4f8; color: #333; margin: 0; }
        .header { position: relative; text-align: center; padding: 30px 20px; background-color: #0f4c81; color: white; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 2em; }
        .header p { margin: 5px 0 0 0; opacity: 0.9; }
        .btn-admin-oculto { position: absolute; top: 15px; right: 20px; color: white; opacity: 0.4; text-decoration: none; font-size: 1.3em; transition: opacity 0.2s; }
        .btn-admin-oculto:hover { opacity: 1; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        .productos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }
        .tarjeta { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #e1e8ed; transition: transform 0.2s; min-height: 340px; box-sizing: border-box; }
        .tarjeta:hover { transform: translateY(-5px); }
        .tarjeta img { width: 100%; height: 160px; object-fit: contain; border-radius: 8px; background-color: #f8fafc; }
        .nombre { font-size: 1.2em; font-weight: bold; margin: 12px 0 5px 0; color: #1a202c; }
        .precio { color: #2b6cb0; font-weight: bold; font-size: 1.4em; margin-bottom: 15px; }
        .btn-whatsapp { background-color: #25d366; color: white; text-decoration: none; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 14px; display: block; text-align: center; transition: background 0.2s; }
        .btn-whatsapp:hover { background-color: #128c7e; }
    </style>
</head>
<body>

    <div class="header">
        <a href="admin.html" class="btn-admin-oculto" title="Administración">⚙️</a>
        <h1>🐟 Pescadería - Catálogo 🐟</h1>
        <p>Precios frescos y actualizados al instante</p>
    </div>

    <div class="container">
        <div id="contenedor-productos" class="productos-grid"></div>
    </div>

    <script>
        // Tu URL de Google Sheets que ya funciona
        const URL_API = "https://script.google.com/macros/s/AKfycbz9hJVU8DDRiyJL9tCe-Or6vRx_u5RIq1FQpggpgl4bIihENEVQ3mi-LcmucDD-n2xj/exec";
        
        // Tu número de teléfono configurado
        const TELEFONO_WHATSAPP = "5491159531312"; 

        function obtenerProductos() {
            const contenedor = document.getElementById("contenedor-productos");
            contenedor.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>Cargando productos frescos...</p>";

            fetch(URL_API)
            .then(res => res.json())
            .then(productos => {
                contenedor.innerHTML = "";
                if (!productos || productos.length === 0) {
                    contenedor.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>No hay productos disponibles.</p>";
                    return;
                }
                productos.forEach(prod => {
                    let urlImagen = prod.imagen || prod.Imagen || prod.foto || "";
                    if (urlImagen.includes("://google.com")) {
                        const match = urlImagen.match(/\/d\/([a-zA-Z0-9_-]+)/);
                        if (match && match) urlImagen = `https://://google.com/uc?export=download&id=${match}`;
                    }
                    const fotoPorDefecto = "data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='240' height='160'><rect width='240' height='180' fill='%23f8fafc'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-family='Arial' font-size='12' fill='%2394a3b8'>Imagen no disponible</text></svg>";
                    const foto = urlImagen ? urlImagen : fotoPorDefecto;
                    
                    // Formato de texto y enlace simplificado y estandarizado
                    var mensajeTexto = "Hola! Me gustaría encargar el siguiente producto: " + prod.nombre + " (Precio: $" + prod.precio + ")";
                    var urlWhatsapp = "https://wa.me/" + TELEFONO_WHATSAPP + "?text=" + encodeURIComponent(mensajeTexto);
                    
                    contenedor.innerHTML += `
                        <div class="tarjeta">
                            <div>
                                <img src="${foto}" alt="${prod.nombre || 'Producto'}" onerror="this.src='${fotoPorDefecto}'">
                                <div class="nombre">${prod.nombre || 'Producto Nuevo'}</div>
                                <div class="precio">$${prod.precio || 0}</div>
                            </div>
                            <a href="${urlWhatsapp}" target="_blank" rel="noopener noreferrer" class="btn-whatsapp">💬 Pedir por WhatsApp</a>
                        </div>
                    `;
                });
            })
            .catch(err => {
                contenedor.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:red;'>Error al cargar el catálogo.</p>";
                console.error(err);
            });
        }
        obtenerProductos();
    </script>
</body>
</html>
