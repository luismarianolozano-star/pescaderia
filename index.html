<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; }
        .card { border: 1px solid #ccc; padding: 15px; border-radius: 8px; width: 200px; text-align: center; }
        .card img { max-width: 100%; height: 150px; object-fit: cover; }
    </style>
</head>
<body>
    <h1>Nuestros Productos</h1>
    <div id="catalogo">Cargando productos...</div>

    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycbz9hJVU8DDRiyJL9tCe-Or6vRx_u5RIq1FQpggpgl4bIihENEVQ3mi-LcmucDD-n2xj/exec";

        fetch(URL_API)
            .then(res => res.json())
            .then(productos => {
                const contenedor = document.getElementById("catalogo");
                contenedor.innerHTML = "";
                productos.forEach(p => {
                    contenedor.innerHTML += `
                        <div class="card">
                            <img src="${p.imagen}" alt="${p.nombre}">
                            <h3>${p.nombre}</h3>
                            <p>Precio: $${p.precio}</p>
                            <small>ID: ${p.id}</small>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
